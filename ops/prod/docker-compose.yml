services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - prod_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  livekit-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  livekit:
    image: livekit/livekit-server:v1.8.4
    restart: unless-stopped
    command: ["--config", "/etc/livekit/livekit.yaml"]
    depends_on:
      livekit-redis:
        condition: service_healthy
    volumes:
      - ./livekit.generated.yaml:/etc/livekit/livekit.yaml:ro
    ports:
      - "7881:7881"
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "50000-52000:50000-52000/udp"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:7880/ | grep -qi ok || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 20

  app:
    build:
      context: ../..
      dockerfile: Dockerfile.app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_MIN: ${JWT_EXPIRES_MIN}
      CORS_ORIGINS: https://${APP_DOMAIN}
      LIVEKIT_URL: wss://${LIVEKIT_DOMAIN}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_TOKEN_TTL_MIN: ${LIVEKIT_TOKEN_TTL_MIN}

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      livekit:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - prod_caddy_data:/data
      - prod_caddy_config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      LIVEKIT_DOMAIN: ${LIVEKIT_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}

volumes:
  prod_pg_data:
  prod_redis_data:
  prod_caddy_data:
  prod_caddy_config:
